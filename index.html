<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <main class="container">
      <article data-testid="test-todo-card" class="card">
        <header class="card-header">
          <h2 data-testid="test-todo-title" id="todo-title">
            Finish Frontend Task
          </h2>
          <div class="actions">
            <button data-testid="test-todo-edit-button" aria-label="Edit task">
              Edit
            </button>
            <button
              data-testid="test-todo-delete-button"
              aria-label="Delete task"
            >
              Delete
            </button>
          </div>
        </header>

        <p data-testid="test-todo-description">
          Build a fully accessible and responsive todo card component.
        </p>

        <div class="meta">
          <span
            data-testid="test-todo-priority"
            class="badge high"
            aria-label="High priority"
            >High</span
          >
          <span data-testid="test-todo-status" id="status">Pending</span>
        </div>

        <div class="time-info">
          <time
            data-testid="test-todo-due-date"
            datetime="2026-05-01T18:00:00Z"
          >
            Due May 1, 2026
          </time>
          <time
            data-testid="test-todo-time-remaining"
            id="time-remaining"
            aria-live="polite"
          >
            Calculating...
          </time>
        </div>

        <div class="tags" data-testid="test-todo-tags" role="list">
          <span role="listitem" data-testid="test-todo-tag-work">work</span>
          <span role="listitem" data-testid="test-todo-tag-urgent">urgent</span>
          <span role="listitem">design</span>
        </div>

        <div class="footer">
          <label>
            <input
              type="checkbox"
              data-testid="test-todo-complete-toggle"
              aria-labelledby="todo-title"
              id="checkbox"
            />
            Mark as complete
          </label>
        </div>
      </article>
    </main>
    <script src="index.js"></script>
  </body>
</html>
